<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioNTech 高管招聘实时监控</title>
    <!-- 引入 React 和 Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 图标组件
        const IconBuilding = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></svg>;
        const IconBriefcase = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconExternal = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>;
        const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconChartBar = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;
        const IconXCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>;

        // 辅助函数：统一解析各种格式的日期 (如 "Mar 10, 2026" 或 "2026-03-10")
        const parseDate = (dateStr) => {
            if (!dateStr) return new Date();
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? new Date() : d;
        };

        function App() {
            const [jobs, setJobs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [error, setError] = useState(null);
            const [activeTab, setActiveTab] = useState('Active'); // 切换 Active 和 Closed 列表

            useEffect(() => {
                // 读取 GitHub 上的 jobs_data.json 文件
                fetch('./public/jobs_data.json')
                    .then(response => {
                        if (!response.ok) throw new Error('无法读取数据文件，请确认 public/jobs_data.json 是否存在。');
                        return response.json();
                    })
                    .then(data => {
                        // 清洗 URL 乱码
                        const cleanedData = data.map(job => {
                            let cleanUrl = job.url;
                            if (cleanUrl && cleanUrl.includes('](')) {
                                const match = cleanUrl.match(/\]\((.*?)\)/);
                                if (match) {
                                    const base = match[1];
                                    const rest = cleanUrl.split(')')[1] || '';
                                    cleanUrl = base + rest;
                                }
                            }
                            return { ...job, url: cleanUrl };
                        });
                        setJobs(cleanedData);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            // 计算趋势图数据 (过去30天的新职位数量)
            const chartData = useMemo(() => {
                const last30Days = [...Array(30)].map((_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() - (29 - i));
                    return d;
                });

                return last30Days.map(targetDate => {
                    const targetDateString = targetDate.toISOString().split('T')[0];
                    const count = jobs.filter(job => {
                        // 如果职位是这天发布的 (只统计 Active 或新发布的，排除诊断提示)
                        if (job.id === 999) return false;
                        const jobDate = parseDate(job.date);
                        return jobDate.toISOString().split('T')[0] === targetDateString;
                    }).length;

                    return {
                        displayDate: `${targetDate.getMonth() + 1}/${targetDate.getDate()}`,
                        fullDate: targetDateString,
                        count
                    };
                });
            }, [jobs]);

            const maxChartCount = Math.max(...chartData.map(d => d.count), 1); // 避免除以 0

            // 过滤列表逻辑
            const filteredJobs = useMemo(() => {
                return jobs.filter(job => {
                    // 1. 剔除测试/报错数据
                    if (job.id === 999) return false;

                    // 2. 关键词搜索
                    const matchSearch = job.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                        job.location.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                        job.department.toLowerCase().includes(searchTerm.toLowerCase());
                    
                    if (!matchSearch) return false;

                    // 3. 状态标签过滤
                    if (activeTab === 'Active') {
                        return job.status === 'Active';
                    } else {
                        // 如果是查看“下架”列表，则过滤出 status = Closed，并且时间在 7 天内
                        if (job.status !== 'Closed') return false;
                        const jobDate = parseDate(job.date);
                        const diffTime = Math.abs(new Date() - jobDate);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        return diffDays <= 7;
                    }
                });
            }, [jobs, searchTerm, activeTab]);

            // 整体数据统计
            const stats = useMemo(() => {
                const validJobs = jobs.filter(j => j.id !== 999);
                return {
                    total: validJobs.length,
                    active: validJobs.filter(j => j.status === 'Active').length,
                    closed7Days: validJobs.filter(j => {
                        if (j.status !== 'Closed') return false;
                        const diffDays = Math.ceil(Math.abs(new Date() - parseDate(j.date)) / (1000 * 60 * 60 * 24));
                        return diffDays <= 7;
                    }).length,
                    senior: validJobs.filter(j => j.level.includes('Senior') || j.level.includes('Executive') || j.level.includes('President')).length
                };
            }, [jobs]);

            if (loading) return <div className="min-h-screen flex items-center justify-center text-xl font-bold text-slate-500">正在同步最新数据...</div>;
            
            if (error) return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="bg-red-50 text-red-700 p-6 rounded-xl border border-red-200 max-w-lg text-center">
                        <h2 className="text-xl font-bold mb-2">数据加载失败</h2>
                        <p>{error}</p>
                        <p className="mt-4 text-sm">请检查您的 GitHub Actions 是否成功运行生成了 public/jobs_data.json。</p>
                    </div>
                </div>
            );

            return (
                <div className="pb-12">
                    {/* Header */}
                    <header className="bg-[#003865] text-white py-6 px-8 shadow-md">
                        <div className="max-w-7xl mx-auto flex items-center gap-4">
                            <div className="bg-white p-2.5 rounded-xl">
                                <span className="text-[#003865]"><IconBuilding /></span>
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight">BioNTech 高管招聘监控看板</h1>
                                <p className="text-blue-200 text-sm mt-1">自动同步数据 (Director 及以上) | 涵盖过去 30 天发布与过去 7 天下架监控</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6 space-y-8">
                        {/* KPI 卡片 */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <KPICard title="过去30天抓取总数" value={stats.total} icon={<IconBriefcase />} color="text-indigo-600" bg="bg-indigo-50" />
                            <KPICard title="当前招聘中 (Active)" value={stats.active} icon={<IconChartBar />} color="text-emerald-600" bg="bg-emerald-50" />
                            <KPICard title="过去7天下架 (Closed)" value={stats.closed7Days} icon={<IconXCircle />} color="text-rose-600" bg="bg-rose-50" />
                            <KPICard title="过去30天核心高管" value={stats.senior} icon={<IconBuilding />} color="text-amber-600" bg="bg-amber-50" />
                        </div>

                        {/* 30天发布趋势柱状图 */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                            <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                                <IconChartBar /> 过去 30 天新职位发布趋势
                            </h3>
                            <div className="h-40 flex flex-col pt-4">
                                {/* 上层：柱子图表区 */}
                                <div className="flex-1 flex items-end gap-1 sm:gap-2 relative border-b border-slate-100">
                                    {chartData.map((d, idx) => (
                                        <div key={idx} className="flex-1 flex flex-col items-center group relative h-full justify-end">
                                            {/* Tooltip 悬浮提示 */}
                                            <div className="absolute -top-10 bg-slate-800 text-white text-xs py-1.5 px-2.5 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-10 pointer-events-none">
                                                {d.fullDate} : <span className="font-bold">{d.count}</span> 个职位
                                            </div>
                                            {/* 柱子 */}
                                            <div 
                                                className="w-full bg-blue-400 hover:bg-[#003865] rounded-t-sm transition-colors duration-300" 
                                                style={{ 
                                                    height: `${(d.count / maxChartCount) * 100}%`,
                                                    minHeight: d.count > 0 ? '4px' : '0'
                                                }}
                                            ></div>
                                        </div>
                                    ))}
                                </div>
                                {/* 下层：X轴日期标签区 */}
                                <div className="flex gap-1 sm:gap-2 mt-2">
                                    {chartData.map((d, idx) => (
                                        <div key={`label-${idx}`} className="flex-1 text-[9px] text-slate-400 text-center truncate">
                                            {idx % 3 === 0 ? d.displayDate : ''}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* 数据表格区 */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="p-5 border-b border-slate-100 bg-slate-50/50 flex flex-col sm:flex-row justify-between items-center gap-4">
                                {/* 切换标签 */}
                                <div className="flex bg-slate-200/50 p-1 rounded-lg">
                                    <button 
                                        onClick={() => setActiveTab('Active')}
                                        className={`px-4 py-1.5 text-sm font-medium rounded-md transition-all ${activeTab === 'Active' ? 'bg-white text-[#003865] shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        过去30天发布 (Active)
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('Closed')}
                                        className={`px-4 py-1.5 text-sm font-medium rounded-md transition-all ${activeTab === 'Closed' ? 'bg-white text-rose-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        过去7天下架 (Closed)
                                    </button>
                                </div>
                                
                                <div className="relative w-full sm:w-72">
                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><IconSearch /></span>
                                    <input 
                                        type="text" 
                                        placeholder="搜索职位、部门或地点..." 
                                        className="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#003865]"
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>
                            
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                            <th className="px-6 py-4 font-semibold w-1/3">职位名称 (Title)</th>
                                            <th className="px-6 py-4 font-semibold">职级 (Level)</th>
                                            <th className="px-6 py-4 font-semibold">地点 (Location)</th>
                                            <th className="px-6 py-4 font-semibold">{activeTab === 'Active' ? '发布日期' : '下架/最后记录日期'}</th>
                                            <th className="px-6 py-4 font-semibold text-right">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {filteredJobs.length > 0 ? filteredJobs.map(job => (
                                            <tr key={job.id} className={`transition-colors ${activeTab === 'Closed' ? 'bg-slate-50/50' : 'hover:bg-slate-50'}`}>
                                                <td className="px-6 py-4">
                                                    <div className={`font-bold ${activeTab === 'Closed' ? 'text-slate-400 line-through' : 'text-[#003865]'}`}>
                                                        {job.title}
                                                    </div>
                                                    <div className="text-xs text-slate-500 mt-1 line-clamp-1">{job.department}</div>
                                                </td>
                                                <td className="px-6 py-4">
                                                    <span className={`px-3 py-1 rounded-full text-xs font-medium ${
                                                        activeTab === 'Closed' ? 'bg-slate-100 text-slate-400' :
                                                        job.level.includes('President') ? 'bg-amber-100 text-amber-700' : 
                                                        job.level.includes('Senior') || job.level.includes('Executive') ? 'bg-emerald-100 text-emerald-700' : 
                                                        'bg-blue-100 text-blue-700'
                                                    }`}>
                                                        {job.level}
                                                    </span>
                                                </td>
                                                <td className="px-6 py-4">
                                                    <div className={`flex items-center gap-1.5 text-sm ${activeTab === 'Closed' ? 'text-slate-400' : 'text-slate-600'}`}>
                                                        <IconMapPin />
                                                        {job.location}
                                                    </div>
                                                </td>
                                                <td className={`px-6 py-4 text-sm ${activeTab === 'Closed' ? 'text-slate-400' : 'text-slate-600'}`}>
                                                    {job.date}
                                                </td>
                                                <td className="px-6 py-4 text-right">
                                                    {activeTab === 'Active' ? (
                                                        <a href={job.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-white bg-[#003865] hover:bg-blue-800 rounded-lg transition-colors">
                                                            直达官网
                                                            <IconExternal />
                                                        </a>
                                                    ) : (
                                                        <span className="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-slate-400 bg-slate-100 rounded-lg cursor-not-allowed">
                                                            已关闭
                                                        </span>
                                                    )}
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr>
                                                <td colSpan="5" className="px-6 py-12 text-center text-slate-500">
                                                    {activeTab === 'Active' ? '没有找到符合条件的在招职位' : '过去7天没有记录到下架的职位'}
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        function KPICard({ title, value, icon, color, bg }) {
            return (
                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex items-center gap-4">
                    <div className={`p-4 rounded-full ${bg} ${color}`}>
                        {icon}
                    </div>
                    <div>
                        <div className="text-slate-500 text-sm font-medium mb-1">{title}</div>
                        <div className="text-3xl font-bold text-slate-800">{value}</div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
